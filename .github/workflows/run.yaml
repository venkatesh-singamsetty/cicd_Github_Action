name: Model Training CICD
permissions:
  id-token: write
  contents: write 
  
on:
  - push

jobs:
  run:
    runs-on: 
      - ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      - uses: iterative/setup-cml@v1
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Train model
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: day-98-2026Apr15/cicd_Github_Action
        run: |
          pip install -r requirements.txt
          python train_model.py

          echo "## Model Metrics" > report.md
          cat scores.txt >> report.md
          
          echo "## Confusion Matrix" >> report.md
          cml publish ConfusionMatrix.png --md >> report.md
          
          echo "## Feature Importance" >> report.md
          cml publish FeatureImportance.png --md >> report.md
          
          cml comment create report.md
